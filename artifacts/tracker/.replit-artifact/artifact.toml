kind = "web"
previewPath = "/"
title = "LiveTrack — Real-Time Package Tracker"
version = "1.0.0"
id = "artifacts/tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20338

[services.development]
run = "pnpm --filter @workspace/tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tracker", "run", "build" ]
publicDir = "artifacts/tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20338"
BASE_PATH = "/"
