[build]
  command = "pnpm run build:netlify"
  publish = "artifacts/tracker/dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  BASE_PATH = "/"
  PORT = "5173"

[context.production.environment]
  NODE_ENV = "production"
  NETLIFY = "true"
  SERVERLESS = "true"

[context.deploy-preview.environment]
  NODE_ENV = "production"
  NETLIFY = "true"
  SERVERLESS = "true"

[context.branch-deploy.environment]
  NODE_ENV = "production"
  NETLIFY = "true"
  SERVERLESS = "true"

[functions]
  node_bundler = "none"
  included_files = ["netlify/functions/package.json", "netlify/functions/node_modules/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
